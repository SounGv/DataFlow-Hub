# Render Blueprint — DATAFLOW HUB backend (free tier)
# Deploy: Render Dashboard → New → Blueprint → เลือก repo นี้
services:
  - type: web
    name: dataflow-hub-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate && npm run seed && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dataflow-hub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: dataflow-hub-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: SPREADSHEET_ID
        value: 1xIR_3Bdi5IYIRAhwpI4jMKmcPmDyJUPHMWwkLpr3ueo
      - key: START_WORKER
        value: "true"          # free tier ไม่มี background worker แยก → รัน worker ใน process เดียวกับ API
      - key: AUTH_DISABLED
        value: "true"          # เปิดใช้โดยไม่ต้อง login — เปลี่ยนเป็น "false" เพื่อเปิดระบบ login กลับ
      - key: SYNC_CRON_MINUTES
        value: "15"
      - key: CORS_ORIGIN
        value: https://aesthetic-lollipop-1bb8ed.netlify.app

  - type: keyvalue
    name: dataflow-hub-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: dataflow-hub-db
    plan: free                 # หมายเหตุ: free Postgres ของ Render มีอายุ 30 วัน
